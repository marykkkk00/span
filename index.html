<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grammar App</title>

<style>
:root {
  --bg:#0B0B0B;
  --text:#F5F3EE;
  --muted:#B9B4AD;
  --accent:#8B2635;
  --line:rgba(245,243,238,0.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:"New Century Schoolbook","TeX Gyre Schola",Georgia,serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* WRAPPER */
.wrapper{
  text-align:center;
  max-width:700px;
  padding:40px;
}

/* TITLE */
h1{
  font-size:3rem;
  letter-spacing:0.08em;
  margin-bottom:16px;
}

.subtitle{
  color:var(--muted);
  font-size:1.1rem;
  line-height:1.6;
  margin-bottom:40px;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:14px 32px;
  border:1px solid var(--line);
  color:var(--text);
  text-decoration:none;
  font-size:1.1rem;
  letter-spacing:0.05em;
  background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
  transition:0.25s;
  cursor:pointer;
}

.btn:hover{
  border-color:var(--accent);
  transform:translateY(-4px);
  color:var(--accent);
}

/* small accent line */
.line{
  width:120px;
  height:1px;
  background:var(--accent);
  margin:24px auto;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="wrapper">

  <h1>GRAMMAR</h1>

  <div class="line"></div>

  <div class="subtitle">
    Изучай испанскую грамматику через понятные правила,<br>
    примеры и реальные тексты уровня A1–B2
  </div>

  <a class="btn" href="main.html">Начать</a>

</div>

</body>
</html>
